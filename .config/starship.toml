add_newline = false


format = "$directory$git_branch$git_status$package$memory_usage$character"

[directory]
truncation_length = 1

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vicmd_symbol = "[«](bold green)"

[memory_usage]
disabled = false
style = "bold dimmed green"
format = "\\[[${ram_pct}]($style)\\]"
